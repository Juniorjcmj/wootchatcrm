# ============================================================
# WPPConnect Server — WhatsApp HTTP API (auto-hospedado)
# Stack independente do Wootchat CRM. Suba como Stack separada no Portainer.
#
#   wppconnect.wootchat.com.br  → porta 21465 do container
#
# Rede: OrionNet (mesma do CRM/Traefik), externa.
# Pré-requisitos no host:
#   - Traefik rodando com certresolver "letsencrypt" e entrypoint "websecure"
#   - DNS wppconnect.wootchat.com.br apontando pro host do Traefik
#
# Variáveis: definidas em .env (ver .env.example).
# ============================================================

version: "3.9"

networks:
  OrionNet:
    external: true

volumes:
  wpp_tokens:
    driver: local
  wpp_userdata:
    driver: local

services:
  wppconnect:
    image: ${WPP_IMAGE:-wppconnect/wppconnect-server:latest}
    container_name: wppconnect
    restart: unless-stopped
    networks:
      - OrionNet

    environment:
      # ── Auth (OBRIGATÓRIO) ──────────────────────────────
      # Esta chave é usada UMA vez por sessão para gerar o Bearer token.
      # Gere com:  openssl rand -hex 32
      SECRET_KEY: ${SECRET_KEY}

      # Host/porta (não troque se não souber)
      HOST: 0.0.0.0
      PORT: 21465

      # Nome do "dispositivo" que aparece no WhatsApp (Aparelhos conectados)
      DEVICE_NAME: ${DEVICE_NAME:-Wootchat CRM}

      # Engine: deixar VENOM ou WPPCONNECT (padrão whatsapp-web.js fork)
      ENGINE: ${ENGINE:-WPPCONNECT}

      # Modo headless do Puppeteer
      HEADLESS: ${HEADLESS:-true}

      # Auto-fecha sessões inativas após X minutos (0 = nunca)
      AUTO_CLOSE: ${AUTO_CLOSE:-0}

      # Locale (atende a maior parte dos casos)
      DEFAULT_LANG: ${DEFAULT_LANG:-pt_BR}

      # ── Webhook ─────────────────────────────────────────
      # NÃO definir aqui — o CRM já configura webhook por sessão automaticamente
      # ao criar a conexão (apontando para /v1/webhooks/wppconnect/{connectionId}).

      # ── Performance ─────────────────────────────────────
      # Limita o nº máximo de listeners do Node EventEmitter
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=2048}

    volumes:
      - wpp_tokens:/usr/src/wpp-server/tokens
      - wpp_userdata:/usr/src/wpp-server/userDataDir

    # WPPConnect usa o Chromium do Puppeteer — precisa de SHM > 64MB default
    shm_size: "2gb"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=OrionNet"

      - "traefik.http.routers.wppconnect.rule=Host(`wppconnect.wootchat.com.br`)"
      - "traefik.http.routers.wppconnect.entrypoints=websecure"
      - "traefik.http.routers.wppconnect.tls=true"
      - "traefik.http.routers.wppconnect.tls.certresolver=letsencrypt"
      - "traefik.http.services.wppconnect.loadbalancer.server.port=21465"

      # Headers de segurança
      - "traefik.http.middlewares.wppconnect-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.wppconnect-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.routers.wppconnect.middlewares=wppconnect-headers"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:21465/api/healthz || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
