# ============================================================
# WPPConnect Server — WhatsApp HTTP API (auto-hospedado)
# Stack independente do Wootchat CRM. Suba como Stack separada no Portainer.
#
#   wppconnect.wootchat.com.br  → porta 21465 do container
#
# Como o projeto não publica imagem Docker oficial, este compose builda
# a imagem localmente a partir do Dockerfile deste diretório (que clona
# o repo do GitHub em build-time e injeta SECRET_KEY em runtime).
#
# No Portainer, use a opção "Repository" apontando pra este repositório
# (Juniorjcmj/wootchatcrm) com path `wppconnect/`. O Portainer vai
# encontrar o docker-compose.yml e buildar o Dockerfile junto.
#
# Rede: OrionNet (mesma do CRM/Traefik), externa.
# Pré-requisitos: DNS wppconnect.wootchat.com.br → host do Traefik.
# Variáveis: definidas em .env (ver .env.example).
# ============================================================

version: "3.9"

networks:
  OrionNet:
    external: true

volumes:
  wpp_tokens:
    driver: local
  wpp_userdata:
    driver: local

services:
  wppconnect:
    build:
      context: .
      args:
        # Pode trocar pra uma tag (ex.: v2.10.0) pra fixar versão
        WPP_REF: ${WPP_REF:-main}
    image: wppconnect-local:${WPP_REF:-main}
    container_name: wppconnect
    restart: unless-stopped
    networks:
      - OrionNet

    environment:
      # Injetado em runtime pelo entrypoint dentro de dist/config.js
      SECRET_KEY:  ${SECRET_KEY}
      DEVICE_NAME: ${DEVICE_NAME:-Wootchat CRM}
      WPP_HOST:    ${WPP_HOST:-http://localhost}
      WPP_PORT:    ${WPP_PORT:-21465}

      # Heap do Node (1 sessão ≈ 1 Chromium ≈ ~500MB)
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=2048}

    volumes:
      - wpp_tokens:/usr/src/wpp-server/tokens
      - wpp_userdata:/usr/src/wpp-server/userDataDir

    # Chromium precisa de SHM maior que o default (64MB)
    shm_size: "2gb"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=OrionNet"

      - "traefik.http.routers.wppconnect.rule=Host(`wppconnect.wootchat.com.br`)"
      - "traefik.http.routers.wppconnect.entrypoints=websecure"
      - "traefik.http.routers.wppconnect.tls=true"
      - "traefik.http.routers.wppconnect.tls.certresolver=letsencrypt"
      - "traefik.http.services.wppconnect.loadbalancer.server.port=21465"

      - "traefik.http.middlewares.wppconnect-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.wppconnect-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.routers.wppconnect.middlewares=wppconnect-headers"
