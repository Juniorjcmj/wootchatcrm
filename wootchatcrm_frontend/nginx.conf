server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Segurança básica
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # config.js é gerado em runtime — nunca cachear
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /config.js =404;
    }

    # JSX/JS/CSS — cache curto (5 min) porque o app cache-busta com ?t=...
    location ~* \.(jsx|js|css)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Fontes/imagens — cache longo
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # SPA: tudo que não bate em arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\.(env|git|claude) {
        deny all;
        return 404;
    }
}
