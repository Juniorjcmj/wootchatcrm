/* ============================================================
   Linear Design System — Tokens
   Source: linear.app marketing surface (provided spec).
   Drop-in: link this CSS file from your HTML head.
   ============================================================ */

/* -- Fonts -------------------------------------------------- */
/* Linear's custom families (Linear Display, Linear Text, Linear Mono)
   are proprietary. We substitute Inter (local variable font) for
   display + text, and JetBrains Mono via Google Fonts for mono.
   To use the real Linear .woff2 files, replace the Inter src below. */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

:root {
  /* ============================================
     COLORS — Brand & accent
     ============================================ */
  --color-primary:        #5e6ad2;  /* Lavender-blue. Scarce: CTA, focus, link emphasis. */
  --color-primary-hover:  #828fff;  /* Lighter lavender on hover. */
  --color-primary-focus:  #5e69d1;  /* Focus-ring tint. */
  --color-brand-secure:   #7a7fad;  /* Muted lavender-gray for security surfaces. */
  --color-on-primary:     #ffffff;

  /* ============================================
     COLORS — Surface ladder (dark canvas, four steps up)
     ============================================ */
  --color-canvas:           #010102;  /* Default page bg. Near-pure black with faint blue. */
  --color-surface-1:        #0d0e10;  /* Cards, panels. */
  --color-surface-2:        #16171a;  /* Featured / hovered cards. */
  --color-surface-3:        #1c1d20;  /* Sub-nav, dropdowns. */
  --color-surface-4:        #232428;  /* Deepest lifted surface. */
  --color-hairline:         #23252a;  /* 1px borders, dividers. */
  --color-hairline-strong:  #2e3036;  /* Focused inputs, hovered cards. */
  --color-hairline-tertiary:#1a1b1e;  /* Tertiary borders, nested surfaces. */

  --color-inverse-canvas:   #ffffff;  /* White-CTA section openers. */
  --color-inverse-surface-1:#f4f5f8;
  --color-inverse-surface-2:#e9ebf0;
  --color-inverse-ink:      #08090a;

  /* ============================================
     COLORS — Text (light gray, not pure white)
     ============================================ */
  --color-ink:           #f7f8f8;  /* Headlines, emphasized body. */
  --color-ink-muted:     #d0d6e0;  /* Meta info on hero panels. */
  --color-ink-subtle:    #8a8f98;  /* Deselected tabs, footer columns. */
  --color-ink-tertiary:  #62666d;  /* Disabled, footnotes. */

  /* ============================================
     COLORS — Semantic (the ONLY semantic chromatic)
     ============================================ */
  --color-semantic-success: #27a644;
  --color-semantic-overlay: rgba(0, 0, 0, 0.6);

  /* In-product color tags (only inside product screenshots) */
  --color-tag-red:    #eb5757;
  --color-tag-orange: #f2994a;
  --color-tag-yellow: #f2c94c;
  --color-tag-green:  #4cb782;
  --color-tag-blue:   #5e6ad2;
  --color-tag-purple: #9b8afb;

  /* ============================================
     TYPE — Families
     ============================================ */
  --font-display: "Inter", "SF Pro Display", -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  --font-text:    "Inter", "SF Pro Text", -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* ============================================
     TYPE — Scale (size / weight / line-height / tracking)
     ============================================ */
  --text-display-xl-size: 80px;  --text-display-xl-lh: 1.05;  --text-display-xl-ls: -3.0px;
  --text-display-lg-size: 56px;  --text-display-lg-lh: 1.10;  --text-display-lg-ls: -1.8px;
  --text-display-md-size: 40px;  --text-display-md-lh: 1.15;  --text-display-md-ls: -1.0px;
  --text-headline-size:   28px;  --text-headline-lh:   1.20;  --text-headline-ls:   -0.6px;
  --text-card-title-size: 22px;  --text-card-title-lh: 1.25;  --text-card-title-ls: -0.4px;
  --text-subhead-size:    20px;  --text-subhead-lh:    1.40;  --text-subhead-ls:    -0.2px;
  --text-body-lg-size:    18px;  --text-body-lg-lh:    1.50;  --text-body-lg-ls:    -0.1px;
  --text-body-size:       16px;  --text-body-lh:       1.50;  --text-body-ls:       -0.05px;
  --text-body-sm-size:    14px;  --text-body-sm-lh:    1.50;  --text-body-sm-ls:    0;
  --text-caption-size:    12px;  --text-caption-lh:    1.40;  --text-caption-ls:    0;
  --text-button-size:     14px;  --text-button-lh:     1.20;  --text-button-ls:     0;
  --text-eyebrow-size:    13px;  --text-eyebrow-lh:    1.30;  --text-eyebrow-ls:    0.4px;
  --text-mono-size:       13px;  --text-mono-lh:       1.50;  --text-mono-ls:       0;

  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semi:    600;
  --weight-bold:    700;

  /* ============================================
     SPACING — 4px base
     ============================================ */
  --space-xxs:     4px;
  --space-xs:      8px;
  --space-sm:     12px;
  --space-md:     16px;
  --space-lg:     24px;
  --space-xl:     32px;
  --space-xxl:    48px;
  --space-section:96px;

  /* ============================================
     RADIUS
     ============================================ */
  --radius-xs:    4px;
  --radius-sm:    6px;
  --radius-md:    8px;   /* buttons, inputs */
  --radius-lg:   12px;   /* cards */
  --radius-xl:   16px;   /* product screenshot panels */
  --radius-xxl:  24px;   /* oversized CTA banners (rare) */
  --radius-pill:9999px;
  --radius-full:9999px;

  /* ============================================
     ELEVATION (carried by surface, not shadow)
     ============================================ */
  --elev-1-bg:     var(--color-surface-1);
  --elev-1-border: 1px solid var(--color-hairline);
  --elev-2-bg:     var(--color-surface-2);
  --elev-2-border: 1px solid var(--color-hairline-strong);
  --elev-3-bg:     var(--color-surface-3);

  /* Subtle white edge highlight (top edge) on lifted panels */
  --edge-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.04);

  /* Focus ring */
  --focus-ring: 0 0 0 2px rgba(94, 105, 210, 0.5);

  /* Layout */
  --container-max: 1280px;
  --nav-height:    56px;

  /* Motion */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 120ms;
  --duration-base: 150ms;
  --duration-slow: 200ms;
}

/* ============================================================
   BASE / RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--color-canvas);
  color: var(--color-ink);
  font-family: var(--font-text);
  font-size: var(--text-body-size);
  line-height: var(--text-body-lh);
  letter-spacing: var(--text-body-ls);
  font-weight: var(--weight-regular);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ============================================================
   SEMANTIC TYPE — drop-in classes (and bare tags)
   ============================================================ */
.t-display-xl, h1.display-xl {
  font-family: var(--font-display);
  font-size: var(--text-display-xl-size);
  line-height: var(--text-display-xl-lh);
  letter-spacing: var(--text-display-xl-ls);
  font-weight: var(--weight-semi);
  color: var(--color-ink);
  margin: 0;
}
.t-display-lg {
  font-family: var(--font-display);
  font-size: var(--text-display-lg-size);
  line-height: var(--text-display-lg-lh);
  letter-spacing: var(--text-display-lg-ls);
  font-weight: var(--weight-semi);
  color: var(--color-ink);
  margin: 0;
}
.t-display-md {
  font-family: var(--font-display);
  font-size: var(--text-display-md-size);
  line-height: var(--text-display-md-lh);
  letter-spacing: var(--text-display-md-ls);
  font-weight: var(--weight-semi);
  color: var(--color-ink);
  margin: 0;
}
.t-headline {
  font-family: var(--font-display);
  font-size: var(--text-headline-size);
  line-height: var(--text-headline-lh);
  letter-spacing: var(--text-headline-ls);
  font-weight: var(--weight-semi);
  color: var(--color-ink);
  margin: 0;
}
.t-card-title {
  font-family: var(--font-display);
  font-size: var(--text-card-title-size);
  line-height: var(--text-card-title-lh);
  letter-spacing: var(--text-card-title-ls);
  font-weight: var(--weight-medium);
  color: var(--color-ink);
  margin: 0;
}
.t-subhead {
  font-family: var(--font-text);
  font-size: var(--text-subhead-size);
  line-height: var(--text-subhead-lh);
  letter-spacing: var(--text-subhead-ls);
  font-weight: var(--weight-regular);
  color: var(--color-ink-muted);
  margin: 0;
}
.t-body-lg {
  font-family: var(--font-text);
  font-size: var(--text-body-lg-size);
  line-height: var(--text-body-lg-lh);
  letter-spacing: var(--text-body-lg-ls);
}
.t-body {
  font-family: var(--font-text);
  font-size: var(--text-body-size);
  line-height: var(--text-body-lh);
  letter-spacing: var(--text-body-ls);
}
.t-body-sm {
  font-family: var(--font-text);
  font-size: var(--text-body-sm-size);
  line-height: var(--text-body-sm-lh);
  letter-spacing: var(--text-body-sm-ls);
}
.t-caption {
  font-family: var(--font-text);
  font-size: var(--text-caption-size);
  line-height: var(--text-caption-lh);
  color: var(--color-ink-subtle);
}
.t-button {
  font-family: var(--font-text);
  font-size: var(--text-button-size);
  line-height: var(--text-button-lh);
  font-weight: var(--weight-medium);
}
.t-eyebrow {
  font-family: var(--font-text);
  font-size: var(--text-eyebrow-size);
  line-height: var(--text-eyebrow-lh);
  letter-spacing: var(--text-eyebrow-ls);
  font-weight: var(--weight-medium);
  color: var(--color-ink-subtle);
  text-transform: none; /* sentence case! */
}
.t-mono {
  font-family: var(--font-mono);
  font-size: var(--text-mono-size);
  line-height: var(--text-mono-lh);
  font-weight: var(--weight-regular);
}

h1 { font: var(--weight-semi) var(--text-display-lg-size)/var(--text-display-lg-lh) var(--font-display); letter-spacing: var(--text-display-lg-ls); margin: 0; }
h2 { font: var(--weight-semi) var(--text-display-md-size)/var(--text-display-md-lh) var(--font-display); letter-spacing: var(--text-display-md-ls); margin: 0; }
h3 { font: var(--weight-semi) var(--text-headline-size)/var(--text-headline-lh) var(--font-display); letter-spacing: var(--text-headline-ls); margin: 0; }
h4 { font: var(--weight-medium) var(--text-card-title-size)/var(--text-card-title-lh) var(--font-display); letter-spacing: var(--text-card-title-ls); margin: 0; }
p  { margin: 0; }
code, pre, kbd { font-family: var(--font-mono); font-size: var(--text-mono-size); }

a {
  color: var(--color-ink);
  text-decoration: none;
  transition: color var(--duration-base) var(--ease-standard);
}
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ============================================================
   UTILITY — ink colors
   ============================================================ */
.ink         { color: var(--color-ink); }
.ink-muted   { color: var(--color-ink-muted); }
.ink-subtle  { color: var(--color-ink-subtle); }
.ink-tertiary{ color: var(--color-ink-tertiary); }
.ink-primary { color: var(--color-primary); }
.ink-success { color: var(--color-semantic-success); }

/* ============================================================
   UTILITY — surfaces
   ============================================================ */
.surface-canvas   { background: var(--color-canvas); }
.surface-1        { background: var(--color-surface-1); }
.surface-2        { background: var(--color-surface-2); }
.surface-3        { background: var(--color-surface-3); }
.surface-4        { background: var(--color-surface-4); }
.hairline-border  { border: 1px solid var(--color-hairline); }

/* Edge highlight on lifted panels */
.lifted {
  background: var(--color-surface-1);
  border: 1px solid var(--color-hairline);
  border-radius: var(--radius-lg);
  box-shadow: var(--edge-highlight);
}

  <style id="wootchat">
/* ============================================================
   Wootchat CRM — overrides + components
   Sits on top of tokens.css (Linear DS).
   Per prompt: custom palette slightly diverges from Linear.
   ============================================================ */

:root {
  /* Wootchat palette (per prompt spec) */
  --wc-canvas:        #08090a;
  --wc-content-bg:    #0f1011;
  --wc-surface:       #161718;
  --wc-surface-2:     #1d1e21;
  --wc-surface-3:     #23252a;
  --wc-border:        #232428;
  --wc-border-strong: #323334;
  --wc-ink:           #f7f8f8;
  --wc-ink-2:         #b4b8bf;
  --wc-ink-muted:     #8a8f98;
  --wc-ink-subtle:    #62666d;
  --wc-accent:        #5e6ad2;
  --wc-accent-hover:  #6e79e0;
  --wc-accent-soft:   rgba(94,105,210,0.14);
  --wc-success:       #27a644;
  --wc-danger:        #eb5757;
  --wc-warning:       #f4a423;
  --wc-bot:           #8b5cf6;
  --wc-whatsapp:      #25d366;
  --wc-instagram:     #e1306c;
  --wc-radius:        6px;
  --wc-sidebar-w:     64px;
  --wc-topbar-h:      48px;

  /* Density (driven by Tweaks panel) */
  --wc-row-h:         44px;
  --wc-pad-y:         16px;
}

[data-density="compact"] {
  --wc-row-h: 36px;
  --wc-pad-y: 10px;
}
[data-density="cozy"] {
  --wc-row-h: 52px;
  --wc-pad-y: 20px;
}

/* Override Linear's near-black canvas to Wootchat's spec */
body {
  background: var(--wc-canvas);
  color: var(--wc-ink);
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  font-feature-settings: "cv11", "ss01", "ss03";
  letter-spacing: -0.11px;
  overflow: hidden;
}

#root { height: 100vh; }

/* Tabler Icons base size */
.ti { font-size: 18px; line-height: 1; }
.ti-sm { font-size: 16px; }
.ti-xs { font-size: 14px; }
.ti-lg { font-size: 20px; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app-shell {
  display: grid;
  grid-template-columns: var(--wc-sidebar-w) 1fr;
  height: 100vh;
  width: 100vw;
  min-width: 1280px;
  background: var(--wc-canvas);
}

body {
  overflow: auto;
}

/* ---- Sidebar ---- */
.sidebar {
  background: var(--wc-canvas);
  border-right: 1px solid var(--wc-border);
  display: flex;
  flex-direction: column;
  width: var(--wc-sidebar-w);
  padding: 12px 0;
  position: relative;
  z-index: 10;
}

.sidebar__logo {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  margin-bottom: 12px;
}
.sidebar__logo-mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(140deg, var(--wc-accent) 0%, #4651b8 100%);
  display: grid;
  place-items: center;
  color: white;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.5px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset;
}

.sidebar__nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
}
.sidebar__nav--bottom {
  margin-top: auto;
  padding-bottom: 8px;
}
.sidebar__divider {
  width: 24px;
  height: 1px;
  background: var(--wc-border);
  margin: 8px auto;
}

.nav-item {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: var(--wc-radius);
  display: grid;
  place-items: center;
  color: var(--wc-ink-muted);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
  border: none;
  background: transparent;
  padding: 0;
}
.nav-item:hover {
  background: var(--wc-surface);
  color: var(--wc-ink);
}
.nav-item.is-active {
  background: var(--wc-surface-3);
  color: var(--wc-ink);
}
.nav-item.is-active::before {
  content: "";
  position: absolute;
  left: -12px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--wc-accent);
  border-radius: 2px;
}
.nav-item__badge {
  position: absolute;
  top: 4px;
  right: 4px;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  background: var(--wc-accent);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 0 4px;
  display: grid;
  place-items: center;
  border: 2px solid var(--wc-canvas);
}

/* Tooltip on hover */
.nav-item__tip {
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  background: var(--wc-surface-3);
  border: 1px solid var(--wc-border-strong);
  color: var(--wc-ink);
  padding: 6px 10px;
  border-radius: var(--wc-radius);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 120ms ease, transform 120ms ease;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
.nav-item__tip kbd {
  margin-left: 8px;
  font-family: inherit;
  font-size: 10px;
  color: var(--wc-ink-subtle);
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
}
.nav-item:hover .nav-item__tip {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}

/* Avatar at base of sidebar */
.sidebar__avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f4a423, #eb5757);
  display: grid;
  place-items: center;
  color: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  margin: 8px auto 0;
  border: 1px solid var(--wc-border-strong);
}
.sidebar__avatar::after {
  content: "";
  position: absolute;
  width: 8px;
  height: 8px;
  background: var(--wc-success);
  border-radius: 50%;
  border: 2px solid var(--wc-canvas);
  margin-left: 22px;
  margin-top: 22px;
}

/* ============================================================
   MAIN CONTENT FRAME
   ============================================================ */
.main {
  display: grid;
  grid-template-rows: var(--wc-topbar-h) 1fr;
  min-width: 0;
  height: 100vh;
  background: var(--wc-content-bg);
}

/* ---- Topbar ---- */
.topbar {
  height: var(--wc-topbar-h);
  border-bottom: 1px solid var(--wc-border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: var(--wc-canvas);
}
.topbar__breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--wc-ink-muted);
  font-size: 13px;
  font-weight: 500;
}
.topbar__breadcrumb > .crumb-current {
  color: var(--wc-ink);
}
.topbar__breadcrumb .sep {
  color: var(--wc-ink-subtle);
  font-size: 11px;
}

.topbar__search {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--wc-surface);
  border: 1px solid var(--wc-border);
  border-radius: var(--wc-radius);
  height: 32px;
  padding: 0 10px;
  width: 320px;
  color: var(--wc-ink-muted);
  font-size: 13px;
  cursor: text;
  transition: border-color 120ms ease;
}
.topbar__search:hover {
  border-color: var(--wc-border-strong);
}
.topbar__search input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--wc-ink);
  font: inherit;
  flex: 1;
  min-width: 0;
}
.topbar__search input::placeholder {
  color: var(--wc-ink-muted);
}
.topbar__search kbd {
  font-family: inherit;
  font-size: 11px;
  color: var(--wc-ink-subtle);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--wc-border);
  padding: 1px 6px;
  border-radius: 3px;
  line-height: 1.4;
}

.topbar__icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--wc-radius);
  display: grid;
  place-items: center;
  color: var(--wc-ink-muted);
  cursor: pointer;
  background: transparent;
  border: none;
  position: relative;
  transition: background 120ms ease, color 120ms ease;
}
.topbar__icon-btn:hover {
  background: var(--wc-surface);
  color: var(--wc-ink);
}
.topbar__icon-btn .pill-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  min-width: 8px;
  height: 8px;
  background: var(--wc-danger);
  border-radius: 4px;
  border: 2px solid var(--wc-canvas);
}

.topbar__workspace {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 4px;
  border-radius: var(--wc-radius);
  height: 32px;
  cursor: pointer;
  transition: background 120ms ease;
  color: var(--wc-ink);
  font-size: 13px;
  font-weight: 500;

<body>
  <div id="root"></div>

  <script>
    (async () => {
      // Cache-bust automático em cada page-load (Safari cacheia muito o JSX/JS).
      const t = new URL(location.href).searchParams.get('t') || Date.now();
      const qs = '?t=' + t;
      const files = [
        'api.js',
        'ws.js',
        'tweaks-panel.jsx',
        'inbox.jsx',
        'pipeline.jsx',
        'leads.jsx',
        'lead-detail-data.jsx',
        'lead-detail.jsx',
        'automations.jsx',
        'new-lead.jsx',
        'connections.jsx',
        'leads.jsx',
        'app.jsx',
      ];
      // dedupe (leads listed before new-lead but it ALSO needs to be after — refresh)
      const seen = new Set();
      const dedup = files.filter(f => seen.has(f) ? false : (seen.add(f), true));
      for (const f of dedup) {
        try {
          const res = await fetch(f + qs);
          if (!res.ok) throw new Error(f + ' ' + res.status);
          const src = await res.text();
          if (f.endsWith('.jsx')) {
            const { code } = Babel.transform(src, { presets: ['react'], filename: f });
            new Function(code)();
          } else {
            // plain .js — execute directly without Babel transform
            new Function(src)();
          }
        } catch (e) {
          console.error('Failed to load ' + f, e);
          const root = document.getElementById('root');
          if (root) root.innerHTML = '<pre style="color:#eb5757;padding:24px;font:13px monospace">Failed to load ' + f + '\n' + (e.message || e) + '</pre>';
          break;
        }
      }
    })();
  </script>
</body>
